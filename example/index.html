<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mission: Reinforceable — Example Game</title>

  <!-- Shared stylesheet is one folder up -->
  <link rel="stylesheet" href="../style.css"/>
</head>

<body>
  <div id="game-container">
    <h1>Mission: Reinforceable</h1>
    <h2 id="scenario-title">Behavior Intervention Simulator</h2>

    <div id="toolbar">
      <div id="teacher-badge">Teacher: <span id="teacher-code">Test</span></div>
      <div id="score-badge">Points: <span id="points">0</span></div>
      <div id="hearts-display" aria-label="Hearts"></div>

      <div id="feedback">
        <div id="coach-icon">
          <img id="coach-img" src="../mr-wizard-0.png" alt="MR Wizard"/>
        </div>
        <div id="feedback-text"></div>
      </div>

    

    <div id="story-text"></div>
    <div id="choices"></div>
      <div id="game-footer">
  <button id="progress-btn" class="ghost">My Progress</button>
  <button id="home-btn" class="ghost">Start Over</button>
</div>
  </div>

  <!-- Shared engine/dashboard are one folder up. Content stays inside this folder. -->
  <script src="../engine.js"></script>
  <script src="../dashboard.js"></script>
  <script src="content.js"></script>
</body>
</html>
